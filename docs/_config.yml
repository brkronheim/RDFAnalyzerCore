theme: jekyll-theme-cayman
title: RDFAnalyzerCore
description: A powerful, config-driven framework for building physics analyses with ROOT RDataFrame
show_downloads: true

# GitHub repository
github:
  repository_url: https://github.com/brkronheim/RDFAnalyzerCore
  repository_name: brkronheim/RDFAnalyzerCore

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Navigation
nav_links:
  - title: Getting Started
    url: GETTING_STARTED.html
  - title: Python Bindings
    url: PYTHON_BINDINGS.html
  - title: Python Bindings Testing
    url: PYTHON_BINDINGS_TESTING.html
  - title: Configuration
    url: CONFIG_REFERENCE.html
  - title: Analysis Guide
    url: ANALYSIS_GUIDE.html
  - title: Architecture
    url: ARCHITECTURE.html
  - title: Plugin Development
    url: PLUGIN_DEVELOPMENT.html
  - title: API Reference
    url: API_REFERENCE.html

# Exclude files from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Include files
include:
  - GETTING_STARTED.md
  - NEW_FEATURES.md
  - PYTHON_BINDINGS.md
  - PYTHON_BINDINGS_TESTING.md
  - CONFIG_REFERENCE.md
  - ANALYSIS_GUIDE.md
  - ARCHITECTURE.md
  - PLUGIN_DEVELOPMENT.md
  - API_REFERENCE.md
  - ONNX_IMPLEMENTATION.md
  - ONNX_MULTI_OUTPUT.md
  - SOFIE_IMPLEMENTATION.md
  - BATCH_SUBMISSION.md
  - DATACARD_GENERATOR.md
  - DATACARD_SYSTEMATICS_EXAMPLE.md
  - COMBINE_INTEGRATION.md
  - PRODUCTION_MANAGER.md
