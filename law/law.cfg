[modules]

nano_tasks
opendata_tasks
plot_tasks
merge_tasks

[core]
default_scheduler_host: localhost
default_scheduler_port: 8082

[logging]
law: INFO
luigi: INFO

[local_fs]

base: /

# ---------------------------------------------------------------------------
# HTCondor workflow settings (used when --workflow htcondor is selected)
# ---------------------------------------------------------------------------
# These options configure LAW's native HTCondor workflow dispatch.
# Override in a site-specific law.cfg or via environment variables.
[job]

# Directory where LAW writes per-job submit/log files.
# Relative paths are resolved against the working directory.
htcondor_job_file_dir: /tmp/law_htcondor_jobs

# Remove job files after successful completion (saves disk space)
htcondor_job_file_dir_cleanup: true

# ---------------------------------------------------------------------------
# HTCondor pool / scheduler (site-specific – override as needed)
# ---------------------------------------------------------------------------
[htcondor_workflow]

# HTCondor pool address.  Leave blank to use the system default.
# Example:  pool: htcondor.example.cern.ch
pool:

# HTCondor schedd address.  Leave blank to use the system default.
# Example:  scheduler: schedd01.example.cern.ch
scheduler:

# Poll interval in minutes (how often LAW queries condor_q for job status).
# Default: 1 minute
poll_interval: 1

# Maximum number of parallel job submissions per poll cycle.
# Increase for large workflows; decrease to avoid overloading the schedd.
# Default: 25
max_parallel_submissions: 25

# ---------------------------------------------------------------------------
# Dask workflow settings (used when --workflow dask is selected)
# ---------------------------------------------------------------------------
[dask_workflow]

# Dask distributed scheduler address.
# Override on the command line with --dask-scheduler tcp://host:8786
# or set here for a fixed cluster.  Leave blank to use a local cluster.
scheduler:

# Number of Dask workers when using a local (in-process) cluster.
# Only relevant when no external scheduler is configured.
workers: 1
