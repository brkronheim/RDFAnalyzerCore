name: CI Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, linux]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Verify runner environment
      run: |
        echo "Using self-hosted runner with preinstalled dependencies"
        uname -a

    - name: Verify ROOT
      run: |
        if command -v root-config >/dev/null 2>&1; then
          echo "root-config found:"; root-config --version
        elif command -v root >/dev/null 2>&1; then
          echo "root found:"; root --version
        else
          echo "ERROR: ROOT not found on runner"; exit 1
        fi
        which nvcc
        nvcc --version
        export CUDAToolkit_ROOT=/usr/local/cuda

    - name: Install Python test dependencies
      run: pip3 install -r requirements-ci.txt

    - name: Configure CMake
      run: cmake -S . -B build -DUSE_CUDA=ON -DONNXRUNTIME_USE_CUDA=ON

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Run tests
      run: ctest --test-dir build --output-on-failure 
