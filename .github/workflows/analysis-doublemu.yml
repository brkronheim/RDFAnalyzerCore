name: CMS DoubleMuon Analysis

# Triggered manually via the GitHub Actions UI or REST API.
# This job builds the CMS Run2016G DoubleMuon analysis, runs the analysis
# executable over a single public CMS Open Data NanoAOD file, and then builds
# the analytic Z→μμ fit inputs (RooFit workspaces + Combine datacards).
# The CI runner's py312 environment is used for the lightweight Python checks,
# while the workspace builder runs with the system Python that matches the
# installed ROOT bindings.
#
# To trigger:
#   GitHub UI:  Actions → "CMS DoubleMuon Analysis (on request)" → Run workflow
#   gh CLI:     gh workflow run analysis-doublemu.yml --ref <branch>
on:
  workflow_dispatch:
    inputs:
      threads:
        description: "Number of RDataFrame threads (default: -1 = all CPUs)"
        required: false
        default: "-1"

jobs:
  run-analysis:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify runner environment
        run: |
          echo "Using self-hosted runner with preinstalled dependencies"
          uname -a

      - name: Verify ROOT
        run: |
          if command -v root-config >/dev/null 2>&1; then
            echo "root-config found:"; root-config --version
          elif command -v root >/dev/null 2>&1; then
            echo "root found:"; root --version
          else
            echo "ERROR: ROOT not found on runner"; exit 1
          fi

      - name: Install Python dependencies
        run: pip3 install -r requirements-ci.txt

      - name: Configure CMake
        run: cmake -S . -B build

      - name: Build cms_doublemu_analysis
        run: |
          cmake . \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
          -DBUILD_TESTS=OFF \
          -DBUILD_COMBINE=ON \
          -DBUILD_COMBINE_HARVESTER=ON \
          -DUSE_CUDA=OFF \
          -DONNXRUNTIME_USE_CUDA=OFF \
          -B build # `correction config --cmake`  # --trace
          cd build
          make -j$(( $(nproc) > 8 ? 8 : $(nproc) ))
          cd ..

      - name: Run analysis executable
        working-directory: build/analyses/CMS_Run2016_DoubleMuon
        env:
          THREADS: ${{ github.event.inputs.threads }}
        run: |
          # Write a minimal override config so the thread count can be injected
          # without modifying the committed ci_cfg.yaml.
          if [ -n "${THREADS}" ] && [ "${THREADS}" != "-1" ]; then
            sed "s/^threads:.*/threads: \"${THREADS}\"/" \
              "${GITHUB_WORKSPACE}/analyses/CMS_Run2016_DoubleMuon/ci_cfg.yaml" \
              > /tmp/ci_cfg_override.yaml
            CFG=/tmp/ci_cfg_override.yaml
          else
            CFG="${GITHUB_WORKSPACE}/analyses/CMS_Run2016_DoubleMuon/ci_cfg.yaml"
          fi
          ./cms_doublemu_analysis "$CFG"

      - name: Verify analysis output ROOT file
        working-directory: build/analyses/CMS_Run2016_DoubleMuon
        run: |
          # Choose meta file if present; histograms and counters are written
          # to the meta file by default, with the main output reserved for the
          # skim tree.  The old CI check assumed the histograms lived in the
          # primary file which caused failures.
          OUT="dimuon_zpeak_ci.root"
          META="dimuon_zpeak_ci_meta.root"
          if [ -f "$META" ]; then
            CHECK="$META"
            echo "Checking meta file for histograms"
          else
            CHECK="$OUT"
            echo "Checking main output file for histograms"
          fi
          python3 - <<'EOF'
          import uproot, sys, os
          f = uproot.open(os.environ['CHECK'])
          keys = f.keys()
          print("ROOT file keys:", keys[:20])
          hist_keys = [k for k in keys if "DimuonMass" in k]
          if not hist_keys:
              print("ERROR: no DimuonMass histograms found in file", os.environ['CHECK'])
              sys.exit(1)
          print(f"OK: found {len(hist_keys)} DimuonMass histogram(s)")
          EOF

      - name: Build analytic Z-peak workspaces and datacards
        run: |
          # Use the ROOT-compatible system Python here. The self-hosted py312
          # environment is fine for uproot-based checks but its PyROOT bindings
          # are not ABI-compatible on the runner.
          HIST_FILE="${GITHUB_WORKSPACE}/build/analyses/CMS_Run2016_DoubleMuon/dimuon_zpeak_ci_meta.root"
          WS_CFG="${GITHUB_WORKSPACE}/analyses/CMS_Run2016_DoubleMuon/zpeak_workspace.yaml"
          FIT_DIR="${GITHUB_WORKSPACE}/analyticFit_ci_run"

          /usr/bin/python3 "${GITHUB_WORKSPACE}/analyses/CMS_Run2016_DoubleMuon/fit_zpeak.py" \
            --workspace-config "${WS_CFG}" \
            --input "${HIST_FILE}" \
            --outdir "${FIT_DIR}"

      - name: Verify fit outputs (datacards + workspaces + plots)
        run: |
          FIT_DIR="${GITHUB_WORKSPACE}/analyticFit_ci_run"
          python3 - << EOF
          import os, sys, glob
          fit_dir = "${FIT_DIR}"
          if not os.path.isdir(fit_dir):
              print(f"ERROR: fit output directory not found: {fit_dir}")
              sys.exit(1)
          datacards = glob.glob(os.path.join(fit_dir, "datacard_*.txt"))
          workspaces = glob.glob(os.path.join(fit_dir, "ws_*.root"))
          plots = glob.glob(os.path.join(fit_dir, "fit_*.png"))
          print(f"Fit output dir: {fit_dir}")
          print(f"  Datacards   : {[os.path.basename(f) for f in datacards]}")
          print(f"  Workspaces  : {[os.path.basename(f) for f in workspaces]}")
          print(f"  Plots       : {[os.path.basename(f) for f in plots]}")
          if not datacards:
              print("ERROR: no datacards found in fit output directory!")
              sys.exit(1)
          if not workspaces:
              print("ERROR: no workspaces found in fit output directory!")
              sys.exit(1)
          if not plots:
            print("ERROR: no fit plots found in fit output directory!")
            sys.exit(1)
          print("OK: fit outputs look good.")
          EOF

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doublemu-analysis-output
          path: |
            build/analyses/CMS_Run2016_DoubleMuon/dimuon_zpeak_ci.root
            analyticFit_ci_run/
          if-no-files-found: error
          retention-days: 7

