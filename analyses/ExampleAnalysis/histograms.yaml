# =============================================================================
# histograms.yaml — Config-driven histogram definitions for ExampleAnalysis
#
# Migrated from histograms.txt.  Format: YAML sequence of maps.
#
# Required keys per entry:
#   name        : histogram identifier (unique)
#   variable    : RDataFrame column to histogram
#   weight      : RDataFrame column used as per-event weight
#   bins        : number of bins
#   lowerBound  : histogram lower edge [GeV]
#   upperBound  : histogram upper edge [GeV]
# Optional:
#   label       : ROOT axis title (supports TLatex)
# =============================================================================

# Z boson mass histogram
- name: ZBosonMass
  variable: ZBosonMass
  weight: normScale
  bins: 60
  lowerBound: 70.0
  upperBound: 110.0
  label: "Z Boson Mass [GeV]"

# Leading muon pT histogram
- name: LeadingMuonPt
  variable: LeadingMuonPt
  weight: normScale
  bins: 50
  lowerBound: 20.0
  upperBound: 150.0
  label: "Leading Muon p_{T} [GeV]"

# Subleading muon pT histogram
- name: SubleadingMuonPt
  variable: SubleadingMuonPt
  weight: normScale
  bins: 50
  lowerBound: 20.0
  upperBound: 150.0
  label: "Subleading Muon p_{T} [GeV]"
